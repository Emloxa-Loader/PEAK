<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMLOXA | PEAK İNDİRME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Dinamik Animasyonlu Arka Plan */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #090a0f, #1a1c2c, #111827, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism (Buzlu Cam) Kart Tasarımı */
        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4rem 5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Başlık Tasarımı */
        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #00f2fe, #4facfe, #00f2fe);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            text-shadow: 0px 0px 20px rgba(79, 172, 254, 0.2);
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        p {
            font-size: 1.1rem;
            color: #8892b0;
            margin-bottom: 3rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* İndirme Butonu Tasarımı */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 1.2rem 3.5rem;
            border-radius: 50px;
            background: linear-gradient(45deg, #1e3c72, #2a5298);
            box-shadow: 0 10px 20px rgba(30, 60, 114, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            z-index: -1;
            transition: opacity 0.4s ease;
            opacity: 0;
        }

        .download-btn:hover::before {
            opacity: 1;
        }

        .download-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(79, 172, 254, 0.5);
            letter-spacing: 1px;
        }

        .download-btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .download-icon {
            width: 26px;
            height: 26px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .download-btn:hover .download-icon {
            transform: translateY(3px);
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>PEAK</h1>
        <p>Resmi İndirme Merkezi</p>
        
        <a href="https://dl1.lim1.dosyaupload.com/hhbP/PEAK.rar?download_token=4706cc3dc160dc5370392a40cbd3049ee65f24c355ef9370b635bef1b95c74a8" class="download-btn">
            <svg class="download-icon" viewBox="0 0 24 24">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
            PEAK.rar
        </a>
    </div>
</body>
</html>
