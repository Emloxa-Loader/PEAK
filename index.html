<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMLOXA | PEAK İNDİRME</title>
    <style>
        /* Özelleştirilmiş Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #070709; }
        ::-webkit-scrollbar-thumb { background: #1a1a24; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ff88; }

        body {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #050507; color: #f3f4f6;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden; position: relative;
        }

        /* Arka Plan Yumuşak Işık Animasyonu */
        body::before {
            content: ''; position: absolute;
            width: 140%; height: 140%;
            background: radial-gradient(circle at 25% 25%, rgba(0, 255, 136, 0.06) 0%, transparent 45%),
                        radial-gradient(circle at 75% 75%, rgba(0, 188, 255, 0.06) 0%, transparent 50%);
            top: -20%; left: -20%; z-index: 0;
            animation: ambientLight 25s ease-in-out infinite alternate;
        }

        @keyframes ambientLight {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(4%, 2%) rotate(4deg); }
        }

        .main-container {
            position: relative; z-index: 10;
            width: 100%; max-width: 540px; padding: 20px;
            animation: cardEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Premium Cam Efekti Kart tasarımı */
        .card {
            background: rgba(13, 13, 18, 0.70);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px; padding: 55px 45px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            position: relative; overflow: hidden;
        }

        /* Parlama Efekti Geçişi */
        .card::after {
            content: ''; position: absolute;
            top: -50%; left: -60%; width: 30%; height: 200%;
            background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.03) 50%, rgba(255, 255, 255, 0) 100%);
            transform: rotate(25deg);
            animation: shimmer 6s infinite ease-in-out;
        }

        @keyframes shimmer {
            0% { left: -60%; }
            30%, 100% { left: 140%; }
        }

        /* EMLOXA Marka Tagı */
        .brand-badge {
            font-size: 11px; text-transform: uppercase; letter-spacing: 0.35em;
            color: #00ff88; font-weight: 800; margin-bottom: 20px;
            display: inline-block; background: rgba(0, 255, 136, 0.07);
            padding: 7px 18px; border-radius: 100px; border: 1px solid rgba(0, 255, 136, 0.15);
        }

        /* Başlık Alanı */
        .title-wrapper h1 {
            font-size: 64px; font-weight: 900; margin: 0 0 6px 0;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 40%, #9ca3af 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px; color: #71717a; margin-bottom: 45px; font-weight: 500;
            letter-spacing: 0.05em; text-transform: uppercase;
        }

        /* Dosya Detay Paneli */
        .file-panel {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px; padding: 22px; margin-bottom: 40px;
            display: flex; align-items: center; justify-content: space-between;
            text-align: left; transition: border-color 0.3s ease;
        }

        .file-panel:hover { border-color: rgba(0, 255, 136, 0.15); }

        .file-info-group { display: flex; align-items: center; gap: 18px; }

        .file-icon-box {
            width: 48px; height: 48px; background: linear-gradient(135deg, #181822, #0d0d13);
            border-radius: 14px; display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .file-icon-box svg { width: 24px; height: 24px; fill: #00bcff; }

        .file-texts .file-name { font-size: 17px; font-weight: 600; color: #ffffff; margin-bottom: 3px; }
        .file-texts .file-type { font-size: 13px; color: #52525b; }

        .verified-tag {
            font-size: 11px; font-weight: 700; color: #00ff88;
            background: rgba(0, 255, 136, 0.05); padding: 6px 14px; border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.12); letter-spacing: 0.05em; text-transform: uppercase;
        }

        /* Premium İndirme Butonu */
        .download-link-wrapper { text-decoration: none; display: block; }

        .btn-premium-download {
            width: 100%; background: linear-gradient(135deg, #00ff88 0%, #00bcff 100%);
            color: #040406; border: none; padding: 20px 30px; font-size: 18px; font-weight: 800;
            border-radius: 20px; cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 35px rgba(0, 255, 136, 0.15); display: flex; justify-content: center;
            align-items: center; gap: 14px; letter-spacing: 0.05em;
        }

        .btn-premium-download svg { width: 22px; height: 22px; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }

        .download-link-wrapper:hover .btn-premium-download {
            transform: translateY(-4px); box-shadow: 0 25px 50px rgba(0, 188, 255, 0.25); filter: brightness(1.08);
        }

        .download-link-wrapper:hover svg { transform: translateY(3px); }
        .download-link-wrapper:active .btn-premium-download { transform: translateY(-1px); }

        /* Güvenlik Bilgisi Alt Bölüm */
        .security-footer {
            margin-top: 40px; display: flex; justify-content: center; align-items: center;
            gap: 30px; border-top: 1px solid rgba(255, 255, 255, 0.04); padding-top: 30px;
        }

        .secure-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #4b5563; font-weight: 500; }
        .secure-item svg { width: 18px; height: 18px; fill: #4b5563; }

        /* Giriş Animasyonları */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobil Uyum */
        @media (max-width: 480px) {
            .card { padding: 40px 25px; }
            .title-wrapper h1 { font-size: 50px; }
            .file-panel { flex-direction: column; align-items: flex-start; gap: 15px; }
            .verified-tag { align-self: flex-end; }
            .security-footer { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="card">

            <div class="title-wrapper">
                <h1>PEAK</h1>

                        </svg>

            </div>

            <a href="https://dl1.lim1.dosyaupload.com/hhbP/PEAK.rar?download_token=4706cc3dc160dc5370392a40cbd3049ee65f24c355ef9370b635bef1b95c74a8" class="download-link-wrapper">
                <button class="btn-premium-download">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M5 20h14v-2H5v2zm7-18L5.33 11h4.24v4h4.85v-4h4.24L12 2z"/>

                    DOSYAYI İNDİR

            <div class="security-footer">
                <div class="secure-item">

                    Sürüm: 1.0.0
                </div>
            </div>
        </div>
    </div>

</body>
</html>
